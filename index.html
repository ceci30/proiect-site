<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cookies Lab</title>

    <script>
        // 1. COOKIE SIMPLU (set test2)
        function setCookie() {
            document.cookie = "test2=triple";
            show("Cookie setat: test2=triple");
        }

        // 2. AFIȘEAZĂ TOATE COOKIE-URILE
        function showAllCookies() {
            show("Toate cookie-urile:<br>" + document.cookie);
        }

        // 3. CAUTĂ COOKIE SPECIFIC
        function searchCookie() {
            let name = document.getElementById("cookieName").value;

            let cookieValue = document.cookie
                .split("; ")
                .find(row => row.startsWith(name + "="))
                ?.split("=")[1];

            if (cookieValue) {
                show("Cookie găsit: " + name + " = " + cookieValue);
            } else {
                show("Cookie-ul nu există");
            }
        }

        // 4. ȘTERGERE COOKIE
        function deleteCookie() {
            document.cookie = "test2=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
            show("Cookie 'test2' șters");
        }

        // AFIȘARE ÎN PAGINĂ
        function show(text) {
            document.getElementById("output").innerHTML = text;
        }
    </script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        button {
            margin-top: 8px;
            padding: 6px 10px;
        }

        input {
            padding: 6px;
            margin-top: 5px;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #999;
            background: #f5f5f5;
        }
    </style>
</head>

<body>

<h1>Imp - Cookies</h1>

<!-- 1 -->
<section>
    <h3>1. Cookie Simplu</h3>
    <button onclick="setCookie()">Set test2=triple</button>
</section>

<!-- 2 -->
<section>
    <h3>2. Toate Cookie-urile</h3>
    <button onclick="showAllCookies()">Afișează document.cookie</button>
</section>

<!-- 3 -->
<section>
    <h3>3. Cookie specific</h3>
    <input id="cookieName" placeholder="Nume cookie (ex: test2)">
    <button onclick="searchCookie()">Caută</button>
</section>

<!-- 4 -->
<section>
    <h3>4. Ștergere Cookie</h3>
    <button onclick="deleteCookie()">Șterge 'test2'</button>
</section>

<!-- OUTPUT -->
<div id="output"></div>

</body>
</html>
