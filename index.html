<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>cookie </title>

    <script>
        //  2 cookies inițiale
        document.cookie = "session=test_GDPR";
        document.cookie = "favorite_task=collect_Data";

        //  1. cookie simplu
        function setSimpleCookie() {
            document.cookie = "username=CeciEmi";
            alert("Cookie simplu!");
        }

        // mai multe cookie-uri
        function setMultipleCookies() {
            document.cookie = "session=active";
            document.cookie = "theme=dark";
            document.cookie = "language=ro";
            alert("Mai multe cookie-uri!");
        }

        // afișare cookie-uri
        function alertCookie() {
            alert("Cookie-uri curente:\n" + document.cookie);
        }

        // ștergere cookie
        function deleteCookie() {
            document.cookie = "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
            alert("Cookie șters!");
        }

        // test în consolă
     function testCookies() {
    alert(document.cookie);
        }

        // 6. cookie cu expirare
        function setCookieWithExpiry() {
            let date = new Date();
            date.setTime(date.getTime() + (60 * 60 * 1000)); // 1 oră

            document.cookie = "tempCookie=hello; expires=" + date.toUTCString() + "; path=/";
            alert("Cookie cu expirare!");
        }
    </script>
</head>

<body>
    <h1>Bine ai venit la laborator</h1>


    <button onclick="alertCookie()">Show cookies</button>

    <hr>

    <!-- EXEMPLE MDN -->
    <button onclick="setSimpleCookie()">Set simple cookie</button>
    <button onclick="setMultipleCookies()">Set multiple cookies</button>
    <button onclick="setCookieWithExpiry()">Set cookie with expiry</button>
    <button onclick="deleteCookie()">Delete cookie</button>
    <button onclick="testCookies()">Test cookies</button>
</body>
</html>
